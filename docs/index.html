<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kurs Rejsów — tracker ofert</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1D2E">
<style>
  :root{
    --navy:#0B1D2E;
    --navy-deep:#071522;
    --brass:#C9A227;
    --brass-soft:#E8CE7A;
    --foam:#EDEFEF;
    --mist:#8FA3B0;
    --ok:#4E9A6B;
    --down:#4E9A6B;
    --up:#B85C4A;
    --card:#122A40;
    --line:rgba(200,210,220,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--navy);
    color:var(--foam);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:70px;
  }
  header{
    padding:28px 20px 22px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(201,162,39,0.16), transparent 60%),
      var(--navy-deep);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
  }
  .wordmark{
    font-family:Georgia,"Times New Roman",serif;
    font-size:26px;
    letter-spacing:0.5px;
    display:flex; align-items:baseline; gap:8px;
  }
  .wordmark .dot{color:var(--brass); font-size:20px;}
  .sub{color:var(--mist); font-size:13px; margin-top:4px;}
  .updated{color:var(--mist); font-size:11px; margin-top:10px; display:flex; justify-content:space-between; align-items:center;}
  .refresh-btn{
    background:none;border:1px solid var(--line); color:var(--brass-soft);
    padding:5px 10px; border-radius:20px; font-size:11px; cursor:pointer;
  }
  main{padding:16px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px;}
  .tab{
    flex:none; padding:8px 14px; border-radius:20px; font-size:13px;
    border:1px solid var(--line); color:var(--mist); cursor:pointer; white-space:nowrap;
  }
  .tab.active{ background:var(--brass); color:var(--navy-deep); border-color:var(--brass); font-weight:600;}

  .section-title{
    font-size:12px; text-transform:uppercase; letter-spacing:1.4px;
    color:var(--brass-soft); margin:22px 0 10px; display:flex; align-items:center; gap:8px;
  }
  .section-title::after{content:""; flex:1; height:1px; background:var(--line);}

  .empty{ color:var(--mist); font-size:14px; padding:20px 4px; line-height:1.5;}

  .change-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:10px;
  }
  .change-card .ship{font-weight:600; font-size:15px;}
  .change-card .meta{color:var(--mist); font-size:12px; margin-top:2px;}
  .price-row{display:flex; justify-content:space-between; font-size:13px; margin-top:8px; padding-top:8px; border-top:1px solid var(--line);}
  .price-row .old{color:var(--mist); text-decoration:line-through; margin-right:6px;}
  .price-row .delta.down{color:var(--ok);}
  .price-row .delta.up{color:var(--up);}
  .badge{
    display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px;
    text-transform:uppercase; letter-spacing:0.5px; font-weight:700; margin-bottom:6px;
  }
  .badge.new{background:rgba(78,154,107,0.18); color:#7fd39c;}
  .badge.removed{background:rgba(184,92,74,0.18); color:#e08a76;}
  .badge.price{background:rgba(201,162,39,0.18); color:var(--brass-soft);}

  .offer{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:10px; display:block; text-decoration:none; color:inherit;
  }
  .offer .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .offer .ship{font-weight:600; font-size:15px;}
  .offer .source{font-size:10px; color:var(--mist); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px;}
  .offer .dates{font-size:12px; color:var(--brass-soft); font-variant-numeric:tabular-nums; white-space:nowrap;}
  .offer .route{font-size:12px; color:var(--mist); margin-top:8px; line-height:1.4;}
  .prices{display:flex; gap:14px; margin-top:10px; flex-wrap:wrap;}
  .price{font-size:12px;}
  .price .label{color:var(--mist); display:block; font-size:10px; text-transform:uppercase;}
  .price .value{font-weight:600; font-variant-numeric:tabular-nums;}
  .price .value.changed{color:var(--brass-soft);}
  .price .old-value{color:var(--mist); text-decoration:line-through; font-size:11px; margin-right:4px; font-weight:400;}
  .price .arrow{font-size:11px; margin-left:3px;}
  .price .arrow.down{color:var(--ok);}
  .price .arrow.up{color:var(--up);}

  .offer.is-new{border-color:rgba(78,154,107,0.5);}
  .offer.has-price-change{border-color:rgba(201,162,39,0.5);}
  .offer-badges{display:flex; gap:6px; margin-bottom:8px;}

  .dismiss-btn{
    background:none; border:1px solid var(--line); color:var(--mist);
    width:24px; height:24px; border-radius:50%; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0; line-height:1;
  }
  .dismiss-btn:active{ background:rgba(184,92,74,0.2); color:#e08a76; }
  .clear-all-row{ text-align:right; margin-bottom:6px; }
  .clear-all-btn{
    background:none; border:none; color:var(--mist); font-size:11px;
    text-decoration:underline; cursor:pointer; padding:4px;
  }

  footer{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--navy-deep); border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    font-size:11px; color:var(--mist); text-align:center;
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Kurs Rejsów<span class="dot">•</span></div>
  <div class="sub">Fiordy, Europa Północna i Śródziemne — 20–31 sierpnia 2026</div>
  <div class="updated">
    <span id="updated-text">Ładowanie…</span>
    <button class="refresh-btn" onclick="location.reload()">Odśwież</button>
  </div>
</header>

<main>
  <div class="tabs">
    <div class="tab" data-tab="changes">Zmiany</div>
    <div class="tab active" data-tab="all">Wszystkie oferty</div>
  </div>

  <div id="sort-row" style="display:flex; gap:8px; margin-bottom:14px;">
    <select id="sort-select" style="flex:1; background:var(--card); color:var(--foam); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:13px;">
      <option value="date">Sortuj: data wypłynięcia</option>
      <option value="price_asc">Sortuj: cena od najniższej</option>
      <option value="price_desc">Sortuj: cena od najwyższej</option>
    </select>
  </div>

  <div id="view-changes" style="display:none;"></div>
  <div id="view-all"></div>
</main>

<footer>Dane odświeżane automatycznie raz dziennie · źródła: alerejsy.pl, rejsujznami.com</footer>

<script>
const fmtEUR = n => n == null ? "—" : n.toLocaleString('pl-PL') + " €";
const fmtDate = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric'});
};

async function loadJSON(path){
  try{
    const res = await fetch(path + '?t=' + Date.now());
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}

function renderOfferCard(o, changeInfo){
  const p = o.prices_eur || {};
  const priceDiffs = (changeInfo && changeInfo.priceChange) ? changeInfo.priceChange.changes : {};

  const priceEntries = [
    ['wewnetrzna', 'Wewnętrzna', p.wewnetrzna],
    ['z_oknem', 'Z oknem', p.z_oknem ?? p['z oknem']],
    ['z_balkonem', 'Z balkonem', p.z_balkonem ?? p['z balkonem']],
    ['apartament', 'Apartament', p.apartament ?? p.typu_suite]
  ].filter(([,,v]) => v !== undefined);

  const priceHtml = priceEntries.map(([key, label, v]) => {
    const diff = priceDiffs[key];
    if(diff){
      const dir = diff.delta < 0 ? 'down' : 'up';
      const arrow = diff.delta < 0 ? '↓' : '↑';
      return `<div class="price"><span class="label">${label}</span>
        <span class="value changed"><span class="old-value">${fmtEUR(diff.old)}</span>${fmtEUR(diff.new)}<span class="arrow ${dir}">${arrow}</span></span></div>`;
    }
    return `<div class="price"><span class="label">${label}</span><span class="value">${fmtEUR(v)}</span></div>`;
  }).join('');

  const badges = [];
  if(changeInfo && changeInfo.isNew) badges.push('<span class="badge new">Nowa</span>');
  if(changeInfo && changeInfo.priceChange) badges.push('<span class="badge price">Zmiana ceny</span>');
  const cardClass = 'offer' + (changeInfo && changeInfo.isNew ? ' is-new' : '') + (changeInfo && changeInfo.priceChange ? ' has-price-change' : '');

  return `
  <a class="${cardClass}" href="${o.url}" target="_blank" rel="noopener">
    ${badges.length ? `<div class="offer-badges">${badges.join('')}</div>` : ''}
    <div class="top">
      <div>
        <div class="ship">${o.ship || 'Statek nieznany'}</div>
        <div class="source">${o.source}</div>
      </div>
      <div class="dates">${fmtDate(o.start_date)} → ${fmtDate(o.end_date)}${o.nights ? ' · ' + o.nights + ' nocy' : ''}</div>
    </div>
    ${o.route ? `<div class="route">${o.route}</div>` : ''}
    <div class="prices">${priceHtml}</div>
  </a>`;
}

function renderChangeCard(kind, item){
  if(kind === 'price'){
    const rows = Object.entries(item.changes).map(([cabin, c]) => {
      const dir = c.delta < 0 ? 'down' : 'up';
      const arrow = c.delta < 0 ? '↓' : '↑';
      return `<div class="price-row">
        <span>${cabin.replace('_',' ')}</span>
        <span><span class="old">${fmtEUR(c.old)}</span><b>${fmtEUR(c.new)}</b> <span class="delta ${dir}">${arrow} ${Math.abs(c.delta)} €</span></span>
      </div>`;
    }).join('');
    return `<div class="change-card">
      <span class="badge price">Zmiana ceny</span>
      <div class="ship">${item.ship || ''}</div>
      <div class="meta">${item.source} · wypłynięcie ${fmtDate(item.start_date)}</div>
      ${rows}
      <div class="meta" style="margin-top:8px;"><a href="${item.url}" target="_blank" style="color:var(--brass-soft);">Zobacz ofertę →</a></div>
    </div>`;
  }
  const badgeClass = kind === 'new' ? 'new' : 'removed';
  const badgeText = kind === 'new' ? 'Nowa oferta' : 'Oferta zniknęła';
  const dismissBtn = kind === 'removed'
    ? `<button class="dismiss-btn" data-dismiss-url="${item.url}" title="Ukryj tę kartę">✕</button>`
    : '';
  return `<div class="change-card">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <span class="badge ${badgeClass}">${badgeText}</span>
      ${dismissBtn}
    </div>
    <div class="ship">${item.ship || ''}</div>
    <div class="meta">${item.source} · ${fmtDate(item.start_date)} → ${fmtDate(item.end_date)}</div>
    ${kind === 'new' ? `<div class="meta" style="margin-top:8px;"><a href="${item.url}" target="_blank" style="color:var(--brass-soft);">Zobacz ofertę →</a></div>` : ''}
  </div>`;
}

const DISMISSED_KEY = 'dismissedRemovedOffers';
function getDismissed(){
  try{ return new Set(JSON.parse(localStorage.getItem(DISMISSED_KEY) || '[]')); }
  catch(e){ return new Set(); }
}
function dismissOffer(url){
  const s = getDismissed(); s.add(url);
  localStorage.setItem(DISMISSED_KEY, JSON.stringify([...s]));
}
function clearDismissed(){
  localStorage.removeItem(DISMISSED_KEY);
}

function renderChangesView(){
  const changesView = document.getElementById('view-changes');
  const changes = _changesData;
  const dismissed = getDismissed();

  if(!changes){
    changesView.innerHTML = `<div class="empty">Brak zmian od ostatniego sprawdzenia. To normalne przy pierwszym uruchomieniu — zmiany pojawią się po kolejnym scrapowaniu.</div>`;
    return;
  }

  const removedVisible = changes.removed_offers.filter(o => !dismissed.has(o.url));
  const totalVisible = changes.price_changes.length + changes.new_offers.length + removedVisible.length;

  if(totalVisible === 0){
    const hiddenNote = dismissed.size > 0 ? `<button class="clear-all-btn" id="clear-dismissed-btn">Pokaż ${dismissed.size} ukrytych ponownie</button>` : '';
    changesView.innerHTML = `<div class="empty">Brak zmian do pokazania.</div>${hiddenNote ? `<div class="clear-all-row">${hiddenNote}</div>` : ''}`;
  } else {
    let html = '';
    if(changes.price_changes.length){
      html += `<div class="section-title">Zmiany cen (${changes.price_changes.length})</div>`;
      html += changes.price_changes.map(c => renderChangeCard('price', c)).join('');
    }
    if(changes.new_offers.length){
      html += `<div class="section-title">Nowe oferty (${changes.new_offers.length})</div>`;
      html += changes.new_offers.map(c => renderChangeCard('new', c)).join('');
    }
    if(removedVisible.length){
      html += `<div class="section-title">Zniknęły (${removedVisible.length})</div>`;
      html += removedVisible.map(c => renderChangeCard('removed', c)).join('');
    }
    changesView.innerHTML = html;
  }

  changesView.querySelectorAll('.dismiss-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      dismissOffer(btn.dataset.dismissUrl);
      renderChangesView();
    });
  });
  const clearBtn = document.getElementById('clear-dismissed-btn');
  if(clearBtn) clearBtn.addEventListener('click', () => { clearDismissed(); renderChangesView(); });
}

function minPrice(offer){
  const vals = Object.values(offer.prices_eur || {}).filter(v => v !== null && v !== undefined);
  return vals.length ? Math.min(...vals) : null;
}

function renderAllOffers(sortMode){
  const allView = document.getElementById('view-all');
  const latest = _latestData, changes = _changesData;

  if(!latest || !latest.offers.length){
    allView.innerHTML = `<div class="empty">Jeszcze nie ma danych.</div>`;
    return;
  }

  const newUrls = new Set((changes ? changes.new_offers : []).map(o => o.url));
  const priceChangeByUrl = {};
  (changes ? changes.price_changes : []).forEach(c => { priceChangeByUrl[c.url] = c; });

  let sorted = [...latest.offers];
  if(sortMode === 'price_asc' || sortMode === 'price_desc'){
    sorted.sort((a,b) => {
      const pa = minPrice(a), pb = minPrice(b);
      if(pa === null && pb === null) return 0;
      if(pa === null) return 1;  // oferty bez ceny na koniec
      if(pb === null) return -1;
      return sortMode === 'price_asc' ? pa - pb : pb - pa;
    });
  } else {
    sorted.sort((a,b) => a.start_date.localeCompare(b.start_date));
  }

  const changedCount = newUrls.size + Object.keys(priceChangeByUrl).length;
  const summaryLine = changedCount > 0
    ? `${sorted.length} ofert w terminie · <span style="color:var(--brass-soft);">${changedCount} zmienionych od ostatniego sprawdzenia</span>`
    : `${sorted.length} ofert w terminie`;

  allView.innerHTML = `<div class="section-title">${summaryLine}</div>` +
    sorted.map(o => renderOfferCard(o, {
      isNew: newUrls.has(o.url),
      priceChange: priceChangeByUrl[o.url] || null,
    })).join('');
}

document.getElementById('sort-select').addEventListener('change', (e) => {
  renderAllOffers(e.target.value);
});

async function init(){
  const [latest, changes] = await Promise.all([
    loadJSON('data/offers_latest.json'),
    loadJSON('data/changes_latest.json'),
  ]);
  _latestData = latest;
  _changesData = changes;

  const updatedEl = document.getElementById('updated-text');
  if(latest){
    updatedEl.textContent = 'Ostatnia aktualizacja: ' + new Date(latest.generated_at).toLocaleString('pl-PL');
  } else {
    updatedEl.textContent = 'Brak danych — scraper jeszcze się nie uruchomił.';
  }

  renderChangesView();
  renderAllOffers(document.getElementById('sort-select').value);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.tab;
    document.getElementById('view-changes').style.display = which === 'changes' ? 'block' : 'none';
    document.getElementById('view-all').style.display = which === 'all' ? 'block' : 'none';
  });
});

init();
</script>
</body>
</html>
